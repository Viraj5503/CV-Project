services:
  api:
    build: .
    ports:
      - "8000:8000"
    # .env is optional: without ANTHROPIC_API_KEY detection still works,
    # only the AI report toggle degrades (reported via report_error).
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build: .
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      PCB_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
